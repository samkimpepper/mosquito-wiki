spring:
  application:
    name=mosquitowiki

  datasource:
    url: jdbc:postgresql://localhost:5432/mosquitodev
    username: mosquitodev
    password: 1589
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration/dev
    validate-on-migrate: true

server:
  port: 8080